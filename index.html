<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karyl C. Lauron | Personal Information</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            /* Deep Space Gradient */
            background: radial-gradient(circle at top left, #0f172a 0%, #020617 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            overflow: hidden;
        }

        /* Floating background decorative elements */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }

        .orb-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -50px; right: -50px; }

        .profile-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 850px;
            display: flex;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .left-panel {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            width: 38%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 24px; /* Square with rounded corners for a modern look */
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            transform: rotate(-2deg);
            transition: 0.3s;
        }

        .profile-pic:hover {
            transform: rotate(0deg) scale(1.05);
            border-color: #3b82f6;
        }

        .status-badge {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .right-panel {
            width: 62%;
            padding: 60px;
        }

        h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #3b82f6;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 15px;
            color: #e2e8f0;
            line-height: 1.4;
            font-weight: 300;
        }

        .expertise-box {
            grid-column: span 2;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="profile-card">
        <div class="left-panel">
            <img src="photo.jpg" alt="Karyl C. Lauron" class="profile-pic">
            <div class="status-badge">chill lang</div>
        </div>
        
        <div class="right-panel">
            <h1>Karyl C. Lauron</h1>
            <span class="subtitle">IT Student </span>
            
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">Location</span>
                    <p class="value">Poblacion, Buug,<br>Zamboanga Sibugay</p>
                </div>

                <div class="info-item">
                    <span class="label">Institution</span>
                    <p class="value">MSU - Zamboanga Sibugay</p>
                </div>

                <div class="info-item">
                    <span class="label">Degree</span>
                    <p class="value">BS in Information Technology</p>
                </div>

                <div class="info-item expertise-box">
                    <span class="label">Specialization & Expertise</span>
                    <p class="value" style="font-size: 18px; color: #fff;">Selling Fish & Sleeping</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
</html>
